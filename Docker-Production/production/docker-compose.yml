version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: qrmaker
      MYSQL_USER: qrmaker
      MYSQL_PASSWORD: qrmakerpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9020:9000"
      - "9021:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    image: bgtuser/make-my-qr-backend:latest
    restart: always
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=qrmaker
      - DATABASE_USER=qrmaker
      - DATABASE_PASSWORD=qrmakerpassword
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=qrstorage.makemyqrcode.com:9020
      - MINIO_SERVER_URL=https://qrstorage.makemyqrcode.com
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=qrmaker-files
      - MINIO_SECURE=True
      - SECRET_KEY=your_django_secret_key_change_in_production
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,app.makemyqrcode.com
      - EMAIL_HOST_USER=blueglobalcloud@gmail.com
      - EMAIL_HOST_PASSWORD=pjooewfxcxhtldod
      - FRONTEND_URL=https://app.makemyqrcode.com
      - BACKEND_URL=https://app.makemyqrcode.com
    ports:
      - "8010:8010"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: bgtuser/make-my-qr-frontend:latest
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  minio_data:
