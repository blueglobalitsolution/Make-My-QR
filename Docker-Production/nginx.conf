server {
    listen 80;
    server_name localhost; # Replace with your domain name in production

    # Increase max upload size
    client_max_body_size 50M;

    # Route requests for the frontend to the react container
    location / {
        proxy_pass http://frontend:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Route requests for the API to the django backend container
    location /api/ {
        proxy_pass http://backend:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route requests for the Django admin to the django backend container
    location /admin/ {
        proxy_pass http://backend:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files directly from the shared volume
    location /static/ {
        alias /app/staticfiles/;
    }

    # Serve media files directly from the shared volume
    location /media/ {
        alias /app/media/;
    }
}
