version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: mysecretpassword # Replace with a strong password in production
      MYSQL_DATABASE: qrmaker
      MYSQL_USER: qrmaker
      MYSQL_PASSWORD: X0QKcA%%P%P1ni # This should match the password in settings.py
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ../
      dockerfile: Docker-Production/Dockerfile.backend
    container_name: django_backend
    command: gunicorn QRmaker.wsgi:application --bind 0.0.0.0:8010
    volumes:
      - ./Backend/QRmaker:/app # Mount for development purposes
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8010"
    ports:
      - "8010:8010"
    env_file:
      - ./.env # For Django settings like SECRET_KEY, debug, etc.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ../
      dockerfile: Docker-Production/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8010/api}
    container_name: react_frontend
    expose:
      - "3010"
    ports:
      - "3010:3010"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge
